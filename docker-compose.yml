services:
  db:
    image: postgres:16-alpine
    container_name: simple-task-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: simple_task
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d simple_task"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: simple-task-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: simple_task
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: change-this-in-production
      JWT_EXPIRES_IN: 24h
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
